<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Airport at Feet</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
--bg:#0c1520;
--card:#111d2e;
--card2:#162435;
--gold:#d4a853;
--text:#f2ead6;
--border:#ffffff15;
--green:#25d366;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:var(--card);
padding:25px;
border-radius:20px;
border:1px solid var(--border);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo i{
font-size:45px;
color:var(--gold);
}

.logo h1{
margin-top:10px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
color:var(--gold);
}

input,select{
width:100%;
padding:12px;
background:var(--card2);
border:1px solid var(--border);
border-radius:10px;
color:white;
}

.trip-buttons{
display:flex;
gap:10px;
}

.trip-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.active{
background:var(--gold);
color:black;
}

.car-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.car-card{
background:var(--card2);
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
border:2px solid transparent;
}

.car-card.selected{
border-color:var(--gold);
}

.result{
margin-top:20px;
padding:15px;
background:var(--card2);
border-radius:12px;
display:none;
}

.result h3{
margin-bottom:10px;
color:var(--gold);
}

.whatsapp{
margin-top:15px;
width:100%;
padding:15px;
background:var(--green);
color:white;
border:none;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.submit-btn{
width:100%;
padding:15px;
margin-top:15px;
background:var(--gold);
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

@media(max-width:600px){

.car-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<i class="fas fa-plane-departure"></i>
<h1>Airport at Feet</h1>
<p>Premium Airport Taxi Service</p>
</div>

<form id="bookingForm">

<div class="form-group">
<label>வாடிக்கையாளர் பெயர் (Name)</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>மொபைல் எண் (Phone Number)</label>
<input type="tel" id="phone" maxlength="10" required>
</div>

<div class="form-group">
<label>பயண தேதி (Date)</label>
<input type="date" id="date" required>
</div>

<div class="form-group">
<label>பயண நேரம் (Time)</label>
<input type="time" id="time" required>
</div>

<div class="form-group">
<label>பயண வழி (Route)</label>
<select id="route">
<option>Kanyakumari → Trivandrum Airport</option>
<option>Trivandrum Airport → Kanyakumari</option>
</select>
</div>

<div class="form-group">
<label>பயண வகை (Trip Type)</label>

<div class="trip-buttons">
<button type="button" class="trip active" data-type="one_way">One Way</button>
<button type="button" class="trip" data-type="two_way">Round Trip</button>
</div>
</div>

<div class="form-group">
<label>லக்கேஜ் எடை (Luggage Weight KG)</label>
<input type="number" id="luggage" value="0">
</div>

<div class="form-group">
<label>காரை தேர்வு செய்யவும்</label>

<div class="car-grid">

<div class="car-card selected" data-car="mini">
<h3>Mini</h3>
<p>₹2800</p>
</div>

<div class="car-card" data-car="sedan">
<h3>Sedan</h3>
<p>₹3400</p>
</div>

<div class="car-card" data-car="suv">
<h3>SUV</h3>
<p>₹4500</p>
</div>

</div>
</div>

<button type="submit" class="submit-btn">
Calculate Fare
</button>

</form>

<div class="result" id="result">

<h3>Booking Summary</h3>

<p>Total Fare :
₹<span id="fare">0</span></p>

<p>50% Advance :
₹<span id="advance">0</span></p>

<button class="whatsapp" id="whatsappBtn">
<i class="fab fa-whatsapp"></i>
Book via WhatsApp
</button>

</div>

</div>

<script>

let tripType="one_way";
let selectedCar="mini";

const fares={
mini:{one_way:2800,two_way:5200},
sedan:{one_way:3400,two_way:6400},
suv:{one_way:4500,two_way:8500}
};

document.querySelectorAll(".trip").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".trip")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

tripType=btn.dataset.type;

};

});

document.querySelectorAll(".car-card").forEach(card=>{

card.onclick=()=>{

document.querySelectorAll(".car-card")
.forEach(c=>c.classList.remove("selected"));

card.classList.add("selected");

selectedCar=card.dataset.car;

};

});

document.getElementById("bookingForm")
.addEventListener("submit",function(e){

e.preventDefault();

let luggage=
Number(document.getElementById("luggage").value);

let fare=
fares[selectedCar][tripType];

if(luggage>70){
fare+=400;
}

let advance=Math.ceil(fare/2);

document.getElementById("fare")
.innerText=fare.toLocaleString();

document.getElementById("advance")
.innerText=advance.toLocaleString();

document.getElementById("result")
.style.display="block";

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let route=document.getElementById("route").value;

let message=
`🚖 New Booking

Name: ${name}
Phone: ${phone}

Date: ${date}
Time: ${time}

Route: ${route}

Trip Type: ${tripType}

Luggage: ${luggage}kg

Vehicle: ${selectedCar}

Total Fare: ₹${fare}

Advance: ₹${advance}`;

document.getElementById("whatsappBtn")
.onclick=function(){

window.open(
`https://wa.me/919 361593854?text=${encodeURIComponent(message)}`,
"_blank"
);

};

});

</script>

</body>
</html>
