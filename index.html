<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloce | Premium Cyberpunk Rental Experience</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151c2c;
            --bg-modal: #111827;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.35);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.2);
            --text-heading: #f3f4f6;
            --text-body: #9ca3af;
            --text-muted: #6b7280;
            --border: #1f2937;
            --border-focus: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Top Navigation Header */
        header {
            background-color: rgba(21, 28, 44, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 3rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: var(--text-heading);
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.05em;
        }

        header h1 span {
            color: var(--accent);
        }

        .header-tag {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--accent);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Layout Structure */
        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        /* Search & Filters Controls */
        .controls {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .search-input, .filter-select {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-heading);
            padding: 0.85rem 1.25rem;
            border-radius: 0.75rem;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .search-input { 
            flex: 1; 
            min-width: 300px; 
        }

        .search-input:focus, .filter-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Dynamic Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 2.5rem;
        }

        /* Premium Vehicle Cards */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7), 0 0 15px 0 rgba(59, 130, 246, 0.1);
        }

        .card-img-wrapper {
            position: relative;
            height: 200px;
            width: 100%;
            overflow: hidden;
            background-color: #1e293b;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.35rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            backdrop-filter: blur(8px);
        }

        .card-badge.available { 
            background-color: rgba(16, 185, 129, 0.15); 
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .card-badge.rented { 
            background-color: rgba(239, 68, 68, 0.15); 
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .vehicle-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 0.35rem;
        }

        .vehicle-title {
            color: var(--text-heading);
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .info-stack {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-bottom: 1.25rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.65rem;
            font-size: 0.9rem;
        }

        .info-label { color: var(--text-muted); }
        .info-value { color: var(--text-heading); font-weight: 500; }

        .price-wrapper {
            display: flex;
            align-items: baseline;
            margin-top: auto;
            padding-bottom: 1.25rem;
        }

        .price-tag {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-heading);
        }

        .price-tag span { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 400;
            margin-left: 0.25rem;
        }

        /* Interactive UI Buttons */
        .btn {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn:hover { 
            background-color: #2563eb; 
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        
        .btn:disabled { 
            background-color: var(--border); 
            color: var(--text-muted); 
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Glassmorphic Modal Windows */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 7, 12, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1.5rem;
        }

        .modal.active { display: flex; }

        .modal-content {
            background-color: var(--bg-modal);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 540px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            background: none; border: none;
            font-size: 1.75rem; cursor: pointer; color: var(--text-muted);
            transition: color 0.2s;
        }

        .close-modal:hover { color: var(--text-heading); }

        .modal-title {
            color: var(--text-heading);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        /* Advanced Forms Layout */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-heading);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1.25rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-heading);
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-control:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .row { display: flex; gap: 1.25rem; }
        .row .form-group { flex: 1; }

        .summary-box {
            background-color: rgba(21, 28, 44, 0.6);
            padding: 1.25rem;
            border-radius: 0.85rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .summary-total {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--success);
        }
    </style>
</head>

            <div class="summary-box">

                </div>
                <div class="form-group">

                    <input type="text" class="form-control" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">

                    <input type="text" class="form-control" placeholder="xxxx xxxx xxxx xxxx" maxlength="19" required>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Expiration Parameters</label>
                        <input type="text" class="form-control" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>Card Verification Value (CVV)</label>
                        <input type="password" class="form-control" placeholder="•••" maxlength="3" required>
                    </div>
                </div>
                <button type="submit" class="btn" style="margin-top: 0.5rem;">Execute Settlement Pipeline</button>
            </form>
        </div>
    </div>

            { id: 41, name: "Tesla Model X Plaid", type: "High-Performance Electric SUV", owner: "EcoDrive Transport Co.", rate: 350, available: true, img: "https://images.unsplash.com/photo-1573700204813-3dfdaecf677c?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" },
            { id: 42, name: "Ford F-150 Lightning Pro", type: "Electric Pickup Truck", owner: "Velocity Fleet Holdings", rate: 200, available: true, img: "https://cdn.jdpower.com/JDP_2022%20Ford%20F-150%20Lightning%20Pro%20Blue%20Front%20Quarter%20View.jpg" },
            { id: 43, name: "Chevrolet Silverado EV RST", type: "All-Electric Full-Size Truck", owner: "Metro Logistics Group", rate: 220, available: false, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnXHPNLvgASzz86-RiD7CcAytOTjStl15VH0FxMgwBg5VpTRyJ4fExn_M&s=10" },
            { id: 44, name: "Porsche Cayenne E-Hybrid", type: "Luxury Plug-In Hybrid SUV", owner: "Elite Luxury Track", rate: 300, available: true, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKQVQ-Z4ZIaNk33SW54IWZApAXC5mUhCuz4hgWxwNKF0Cifc6FykY06P7P&s=10" },
            { id: 45, name: "Audi Q7 TFSI e", type: "Plug-In Hybrid Luxury SUV", owner: "Prestige Executive Auto", rate: 280, available: true, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSn_aDcFEFvnimdi06icO0MSvLPU_TQMRISpUdNew_eDLJqfyawuYQN0Pr-&s=10" }
        ];

        let selectedVehicle = null;

        const fleetGrid = document.getElementById('fleetGrid');
        const searchBar = document.getElementById('searchBar');
        const statusFilter = document.getElementById('statusFilter');
        const paymentModal = document.getElementById('paymentModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const paymentForm = document.getElementById('paymentForm');
        const rentalDaysInput = document.getElementById('rentalDays');

        function renderFleet(data) {
            fleetGrid.innerHTML = '';
            if(data.length === 0) {
                fleetGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 5rem 0; font-size: 1.1rem;">No digital assets match structural parameters.</div>`;
                return;
            }
            
            data.forEach(v => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img class="card-img" src="${v.img}" alt="${v.name}" loading="lazy">
                        <span class="card-badge ${v.available ? 'available' : 'rented'}">${v.available ? 'Available' : 'Rented'}</span>
                    </div>
                    <div class="card-body">
                        <div class="vehicle-type">${v.type}</div>
                        <div class="vehicle-title">${v.name}</div>
                        <div class="info-stack">
                            <div class="info-row">
                                <span class="info-label">Custodian Record</span>
                                <span class="info-value">${v.owner}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">System Tracking ID</span>
                                <span class="info-value">#00${v.id}AX</span>
                            </div>
                        </div>
                        <div class="price-wrapper">
                            <div class="price-tag">$${v.rate}<span>/ day</span></div>
                        </div>
                        <button class="btn" ${v.available ? '' : 'disabled'} onclick="openBooking(${v.id})">
                            ${v.available ? 'Initialize Lease Protocol' : 'Allocation Locked'}
                        </button>
                    </div>
                `;
                fleetGrid.appendChild(card);
            });
        }

        function filterData() {
            const query = searchBar.value.toLowerCase();
            const status = statusFilter.value;

            const filtered = vehicles.filter(v => {
                const matchesSearch = v.name.toLowerCase().includes(query) || 
                                      v.type.toLowerCase().includes(query) || 
                                      v.owner.toLowerCase().includes(query);
                
                const matchesStatus = (status === 'all') || 
                                      (status === 'available' && v.available) || 
                                      (status === 'rented' && !v.available);

                return matchesSearch && matchesStatus;
            });
            renderFleet(filtered);
        }

        searchBar.addEventListener('input', filterData);
        statusFilter.addEventListener('change', filterData);

        window.openBooking = function(id) {
            selectedVehicle = vehicles.find(v => v.id === id);
            if(!selectedVehicle) return;

            document.getElementById('summaryName').innerText = selectedVehicle.name;
            document.getElementById('summaryOwner').innerText = selectedVehicle.owner;
            document.getElementById('summaryRate').innerText = `$${selectedVehicle.rate} / day`;
            
            updateTotal();
            paymentModal.classList.add('active');
        };

        function updateTotal() {
            if(!selectedVehicle) return;
            const days = parseInt(rentalDaysInput.value) || 1;
            document.getElementById('summaryTotal').innerText = `$${(selectedVehicle.rate * days).toFixed(2)}`;
        }

        rentalDaysInput.addEventListener('input', updateTotal);
        closeModalBtn.addEventListener('click', () => paymentModal.classList.remove('active'));

        paymentForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            alert(`TRANSCTION DISPATCH SUCCESSFUL\n\nAuthorization Cryptic Receipt:\n───────────────────────────────────\nAsset Class: ${selectedVehicle.name}\nCalculated Pipeline Settlement: ${document.getElementById('summaryTotal').innerText}\nOperational Horizon: ${rentalDaysInput.value} computational days\n───────────────────────────────────\nDigital signature validated via secure gateway.`);
            
            selectedVehicle.available = false;
            paymentModal.classList.remove('active');
            paymentForm.reset();
            filterData();
        });

        // Initialize Production Environment
        renderFleet(vehicles);
    </script>
